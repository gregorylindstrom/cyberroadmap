name: Scrape Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/scripts/scraper.py'
      - '.github/workflows/scrape-jobs.yml'
      - 'requirements.txt'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Run scraper
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_USER_EMAIL: ${{ secrets.USAJOBS_USER_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          THE_MUSE_API_KEY: ${{ secrets.THE_MUSE_API_KEY }}
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          CAREERONESTOP_USER_ID: ${{ secrets.CAREERONESTOP_USER_ID }}
          CAREERONESTOP_API_TOKEN: ${{ secrets.CAREERONESTOP_API_TOKEN }}
        run: python .github/scripts/scraper.py

      - name: Verify output
        run: |
          python -c "import json; d=json.load(open('public/data/jobs.json')); print('total_jobs:', d['meta']['total_jobs'])"

      - name: Commit and push updates
        run: |
          git config user.name "cyberroadmap-bot"
          git config user.email "actions@github.com"

          git add public/data/jobs.json
          # Also commit the TheirStack throttle marker if it changed
          if [ -f .theirstack_last_run ]; then
            git add .theirstack_last_run
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update jobs.json [automated]"

            # Retry push up to 3 times with pull --rebase for concurrent commits
            for i in 1 2 3; do
              echo "Push attempt $i..."
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            echo "Push complete"
          fi
