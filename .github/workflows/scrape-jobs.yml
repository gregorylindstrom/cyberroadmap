name: Scrape Jobs

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual triggering from the GitHub UI (useful for testing)
  workflow_dispatch:

  # Also run on push when the scraper itself changes, for verification
  push:
    branches: [main]
    paths:
      - '.github/scripts/scraper.py'
      - '.github/workflows/scrape-jobs.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit the updated jobs.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_USER_EMAIL: ${{ secrets.USAJOBS_USER_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          THE_MUSE_API_KEY: ${{ secrets.THE_MUSE_API_KEY }}
        run: python .github/scripts/scraper.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "cyberroadmap-bot"
          git config user.email "actions@github.com"

          git add public/data/jobs.json

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update jobs.json [automated]"
            git push
          fi
